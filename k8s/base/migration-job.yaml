# ─────────────────────────────────────────────
# Database migration Job (run before API deployment)
# ─────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  namespace: habeshahub
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/habeshahub/api:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: habeshahub-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
# ─────────────────────────────────────────────
# Search reindex CronJob (daily full sync)
# ─────────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: search-reindex
  namespace: habeshahub
spec:
  schedule: "0 3 * * *"  # 3am daily
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: reindex
              image: ghcr.io/habeshahub/api:latest
              command: ["node", "-e", "require('./dist/infrastructure/search-sync').syncAllIndexes().then(() => process.exit(0))"]
              envFrom:
                - configMapRef:
                    name: habeshahub-config
                - secretRef:
                    name: habeshahub-secrets
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
