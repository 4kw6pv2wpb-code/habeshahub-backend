# ─────────────────────────────────────────────
# NATS JetStream (event bus)
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: habeshahub
  labels:
    app: nats
    tier: messaging
spec:
  serviceName: nats
  replicas: 3
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
        tier: messaging
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            - "--cluster_name=habeshahub-nats"
            - "--js"
            - "--sd=/data"
            - "--cluster=nats://0.0.0.0:6222"
            - "--routes=nats://nats-0.nats:6222,nats://nats-1.nats:6222,nats://nats-2.nats:6222"
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 6222
              name: cluster
            - containerPort: 8222
              name: monitoring
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: nats-storage
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: nats-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: habeshahub
spec:
  type: ClusterIP
  ports:
    - port: 4222
      targetPort: 4222
      name: client
    - port: 8222
      targetPort: 8222
      name: monitoring
  selector:
    app: nats
