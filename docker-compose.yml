version: "3.9"

services:
  # ──────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: habeshahub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: habeshahub
      POSTGRES_PASSWORD: password
      POSTGRES_DB: habeshahub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habeshahub -d habeshahub_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # Redis Cache & Pub/Sub
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: habeshahub_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # Meilisearch
  # ──────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: habeshahub_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: masterKey123
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  # ──────────────────────────────────────
  # NATS Event Bus
  # ──────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: habeshahub_nats
    restart: unless-stopped
    command: ["--js", "--sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # MinIO (S3-compatible Object Storage)
  # ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: habeshahub_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: habeshahub
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # Backend API
  # ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: habeshahub_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://habeshahub:password@postgres:5432/habeshahub_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_32chars_min}
      JWT_EXPIRES_IN: 24h
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY: masterKey123
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      RATE_LIMIT_POINTS: 200
      RATE_LIMIT_DURATION: 86400
      NATS_URL: nats://nats:4222
      NATS_ENABLED: "true"
      S3_BUCKET: habeshahub-media
      S3_REGION: us-east-1
      S3_ACCESS_KEY: habeshahub
      S3_SECRET_KEY: password123
      CDN_BASE_URL: http://minio:9000/habeshahub-media
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────
  # Nginx Reverse Proxy
  # ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: habeshahub_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  nats_data:
  minio_data:
